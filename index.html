<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sophia 美股市場簡報</title>
<style>
:root {
  --bg: #f5f4f0;
  --card: #ffffff;
  --text: #1a1a19;
  --muted: #6b6a65;
  --border: rgba(26,26,25,0.10);
  --green: #1D9E75;
  --red: #D85A30;
  --blue: #378ADD;
  --purple: #8B5CF6;
  --amber: #E8A020;
  --shadow: 0 1px 4px rgba(0,0,0,0.07);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.10);
  --radius: 14px;
  --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a1a;
    --card: #252525;
    --text: #f0ede6;
    --muted: #a8a49c;
    --border: rgba(240,237,230,0.09);
    --shadow: 0 1px 4px rgba(0,0,0,0.35);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

/* Header */
.header {
  background: linear-gradient(135deg, #0a1628 0%, #0f2a45 45%, #0d1f35 100%);
  color: #fff; position: relative; overflow: hidden;
}
.header::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 70% 50%, rgba(55,138,221,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.header-inner { max-width: 960px; margin: 0 auto; padding: 44px 28px 40px; position: relative; }
.header-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.brand-icon {
  width: 36px; height: 36px; border-radius: 9px;
  background: linear-gradient(135deg, #378ADD, #1D9E75);
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.brand-text { font-size: 12px; font-weight: 700; letter-spacing: 2.5px; color: rgba(255,255,255,0.45); text-transform: uppercase; }
.header-title { font-size: 32px; font-weight: 900; line-height: 1.2; margin-bottom: 10px; letter-spacing: -0.5px; }
.header-subtitle { font-size: 13px; color: rgba(255,255,255,0.45); line-height: 1.6; max-width: 580px; }
.header-tickers { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }
.ticker-chip {
  font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px;
  background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5);
  border: 1px solid rgba(255,255,255,0.10); letter-spacing: 0.5px;
}

/* Container */
.container { max-width: 960px; margin: 0 auto; padding: 36px 28px 100px; }

/* Section title */
.section-title {
  font-size: 10px; font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 16px; padding-bottom: 9px;
  border-bottom: 1px solid var(--border);
}

/* Latest cards */
.latest-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 40px; }
@media (max-width: 560px) { .latest-grid { grid-template-columns: 1fr; } }

.latest-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 22px 24px;
  text-decoration: none; color: var(--text); box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  display: flex; align-items: center; gap: 16px;
  position: relative; overflow: hidden;
}
.latest-card::after {
  content: '→';
  position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
  font-size: 16px; color: var(--muted); transition: right 0.15s;
}
.latest-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.latest-card:hover::after { right: 16px; }

.lc-icon {
  width: 48px; height: 48px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
}
.lc-icon.pre { background: linear-gradient(135deg, rgba(232,160,32,0.15), rgba(232,160,32,0.08)); }
.lc-icon.aft { background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(139,92,246,0.08)); }
.lc-body { flex: 1; min-width: 0; padding-right: 20px; }
.lc-tag  { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.lc-name { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
.lc-desc { font-size: 12px; color: var(--muted); }

/* History */
#loading { text-align: center; padding: 48px 20px; font-size: 14px; color: var(--muted); }
.spinner {
  display: inline-block; width: 18px; height: 18px; margin-right: 8px;
  border: 2px solid var(--border); border-top-color: var(--blue);
  border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

#error {
  display: none;
  background: rgba(216,90,48,0.07); border: 1px solid rgba(216,90,48,0.18);
  border-radius: 10px; padding: 16px 20px; color: var(--red);
  font-size: 13px; margin-bottom: 20px; line-height: 1.6;
}

.date-group { margin-bottom: 10px; }
.date-row { display: flex; align-items: center; gap: 10px; padding: 16px 0 8px; }
.date-label { font-size: 12px; font-weight: 700; color: var(--muted); white-space: nowrap; }
.date-line { flex: 1; height: 1px; background: var(--border); }

.report-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 480px) { .report-row { grid-template-columns: 1fr; } }

.report-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px;
  text-decoration: none; color: var(--text); box-shadow: var(--shadow);
  transition: transform 0.13s, box-shadow 0.13s;
  display: flex; align-items: center; gap: 10px;
}
.report-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.report-card.missing { opacity: 0.32; cursor: not-allowed; pointer-events: none; }
.rc-icon { font-size: 20px; flex-shrink: 0; }
.rc-info { flex: 1; min-width: 0; }
.rc-type { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 2px; }
.rc-label { font-size: 13px; font-weight: 700; }
.rc-badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 5px; white-space: nowrap; flex-shrink: 0; }
.pre-badge  { background: rgba(232,160,32,0.12);  color: var(--amber);  }
.aft-badge  { background: rgba(139,92,246,0.12);  color: var(--purple); }
.miss-badge { background: rgba(107,106,101,0.10); color: var(--muted);  }

/* Footer */
.footer { background: var(--card); border-top: 1px solid var(--border); padding: 22px 0; }
.footer-inner {
  max-width: 960px; margin: 0 auto; padding: 0 28px;
  font-size: 11px; color: var(--muted);
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 8px;
}
.footer-right { display: flex; gap: 16px; }
.footer-link { color: var(--blue); text-decoration: none; font-weight: 600; font-size: 11px; }
.footer-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-brand">
      <div class="brand-icon">📊</div>
      <div class="brand-text">Sophia 美股市場簡報系統</div>
    </div>
    <div class="header-title">每日美股市場簡報</div>
    <div class="header-subtitle">自動化盤前分析 &amp; 盤後收盤報告，每個交易日自動生成並更新</div>
    <div class="header-tickers">
      <span class="ticker-chip">NVDA</span><span class="ticker-chip">MRVL</span>
      <span class="ticker-chip">CRDO</span><span class="ticker-chip">AVGO</span>
      <span class="ticker-chip">TSM</span><span class="ticker-chip">ALAB</span>
      <span class="ticker-chip">GOOGL</span><span class="ticker-chip">AAPL</span>
      <span class="ticker-chip">MU</span><span class="ticker-chip">VRT</span>
      <span class="ticker-chip">ETN</span><span class="ticker-chip">AMZN</span>
      <span class="ticker-chip">MSFT</span>
    </div>
  </div>
</div>

<div class="container">

  <div class="section-title">⚡ 最新報告</div>
  <div class="latest-grid">
    <a class="latest-card" href="reports/latest_premarket.html">
      <div class="lc-icon pre">🌅</div>
      <div class="lc-body">
        <div class="lc-tag">最新盤前</div>
        <div class="lc-name">開盤前分析簡報</div>
        <div class="lc-desc">期貨指標 · 催化劑 · 個股盤前動向</div>
      </div>
    </a>
    <a class="latest-card" href="reports/latest_aftermarket.html">
      <div class="lc-icon aft">🌙</div>
      <div class="lc-body">
        <div class="lc-tag">最新盤後</div>
        <div class="lc-name">盤後收盤簡報</div>
        <div class="lc-desc">收盤數據 · 財報 · 個股分析 · 明日展望</div>
      </div>
    </a>
  </div>

  <div class="section-title">📅 歷史報告</div>
  <div id="loading"><span class="spinner"></span>載入報告清單中…</div>
  <div id="error"></div>
  <div id="report-list"></div>

</div>

<div class="footer">
  <div class="footer-inner">
    <div>Sophia 美股市場簡報系統 · 自動生成，僅供參考，不構成投資建議</div>
    <div class="footer-right">
      <a class="footer-link" href="reports/latest_premarket.html">最新盤前</a>
      <a class="footer-link" href="reports/latest_aftermarket.html">最新盤後</a>
    </div>
  </div>
</div>

<script>
const REPO = 'sophieku840814/US_stock_daily';
const API  = `https://api.github.com/repos/${REPO}/contents/reports`;
const BASE = `https://sophieku840814.github.io/US_stock_daily/reports`;

function parseDate(name) {
  const m = name.match(/(\d{8})/);
  if (!m) return null;
  const d = m[1];
  return `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`;
}
function formatDate(iso) {
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
}

async function loadReports() {
  const listEl = document.getElementById('report-list');
  const loadEl = document.getElementById('loading');
  const errEl  = document.getElementById('error');
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error(`GitHub API ${res.status}`);
    const files = await res.json();

    const dates = {};
    files.forEach(f => {
      const date = parseDate(f.name);
      if (!date) return;
      if (!dates[date]) dates[date] = { pre: false, aft: false };
      if (f.name.startsWith('premarket_'))   dates[date].pre = true;
      if (f.name.startsWith('aftermarket_')) dates[date].aft = true;
    });

    const sorted = Object.keys(dates).sort((a, b) => b.localeCompare(a));
    if (sorted.length === 0) {
      loadEl.textContent = '📭 尚無歷史報告';
      return;
    }
    loadEl.style.display = 'none';

    sorted.forEach(date => {
      const d  = dates[date];
      const ds = date.replace(/-/g, '');
      const group = document.createElement('div');
      group.className = 'date-group';
      group.innerHTML = `
        <div class="date-row">
          <div class="date-label">📆 ${formatDate(date)}</div>
          <div class="date-line"></div>
        </div>
        <div class="report-row">
          ${d.pre
            ? `<a class="report-card" href="${BASE}/premarket_${ds}.html">
                <span class="rc-icon">🌅</span>
                <div class="rc-info"><div class="rc-type">盤前分析</div><div class="rc-label">開盤前簡報</div></div>
                <span class="rc-badge pre-badge">盤前</span></a>`
            : `<div class="report-card missing">
                <span class="rc-icon">🌅</span>
                <div class="rc-info"><div class="rc-type">盤前分析</div><div class="rc-label">尚未生成</div></div>
                <span class="rc-badge miss-badge">未生成</span></div>`
          }
          ${d.aft
            ? `<a class="report-card" href="${BASE}/aftermarket_${ds}.html">
                <span class="rc-icon">🌙</span>
                <div class="rc-info"><div class="rc-type">盤後收盤</div><div class="rc-label">收盤後簡報</div></div>
                <span class="rc-badge aft-badge">盤後</span></a>`
            : `<div class="report-card missing">
                <span class="rc-icon">🌙</span>
                <div class="rc-info"><div class="rc-type">盤後收盤</div><div class="rc-label">尚未生成</div></div>
                <span class="rc-badge miss-badge">未生成</span></div>`
          }
        </div>`;
      listEl.appendChild(group);
    });

  } catch(e) {
    loadEl.style.display = 'none';
    errEl.style.display  = 'block';
    errEl.innerHTML = `⚠️ 無法載入報告清單（${e.message}）<br>
      <span style="font-size:11px;opacity:0.8;">
        可能原因：GitHub Repo 尚未設為 Public。<br>
        請至 GitHub → Settings → Danger Zone → Change repository visibility → Make public<br>
        或直接點上方「最新報告」瀏覽最新簡報。
      </span>`;
  }
}
loadReports();
</script>
</body>
</html>
